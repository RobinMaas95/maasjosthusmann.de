---
distFolder: public
setup:
- name: Setup project
  action: peaceiris/actions-hugo@v2
  properties:
    extended: true
    hugo-version: 0.160.1
build:
  name: Build project
  command: hugo --gc --minify --cacheDir /tmp/maasjosthusmann-hugo-cache -b $SITE_URL
  environment:
    SITE_URL: ${{ steps.project.outputs.site-url }}
